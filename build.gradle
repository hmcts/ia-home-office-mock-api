plugins {
  id 'application'
  id 'checkstyle'
  id 'pmd'
  id 'jacoco'
  id 'io.spring.dependency-management' version '1.1.7'
  id 'org.springframework.boot' version '3.5.15'
  id 'org.owasp.dependencycheck' version '12.2.2'
  id 'uk.gov.hmcts.java' version '0.12.70'
  id 'com.github.ben-manes.versions' version '0.54.0'
  id 'org.sonarqube' version '7.3.1.8318'
  id 'maven-publish'
  id "org.openapi.generator" version "7.23.0"
}

apply plugin: 'java'
apply plugin: 'org.openapi.generator'

group = 'uk.gov.hmcts.reform'
version = '0.0.1'

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(21)
  }
}

sourceSets {
  functionalTest {
    java {
      compileClasspath += main.output
      runtimeClasspath += main.output
      srcDir file('src/functionalTest/java')
    }
    resources.srcDir file('src/functionalTest/resources')
  }

  integrationTest {
    java {
      compileClasspath += main.output
      runtimeClasspath += main.output
      srcDir file('src/integrationTest/java')
    }
    resources.srcDir file('src/integrationTest/resources')
  }

  smokeTest {
    java {
      compileClasspath += main.output
      runtimeClasspath += main.output
      srcDir file('src/smokeTest/java')
    }
    resources.srcDir file('src/smokeTest/resources')
  }
}

def apiGenerateBuildDir = "${project.getLayout().getBuildDirectory()}/apidocs".toString()

openApiGenerate {
  generatorName = "spring"

  inputSpec = "$projectDir/swagger/homeOfficeAppealsApi.yaml".toString()
  outputDir = apiGenerateBuildDir

  apiPackage = "uk.gov.hmcts.reform.iahomeofficemockapi.generated.infrastructure.api"
  invokerPackage = "uk.gov.hmcts.reform.iahomeofficemockapi.generated.infrastructure.api.invoker"
  modelPackage = "uk.gov.hmcts.reform.iahomeofficemockapi.generated.domain.entities"

  configOptions = [
          dateLibrary: "java8",
          serializationLibrary: "jackson",
          useSpringBoot3: "true"
  ]
}

tasks.register('copyApiDocs', Copy) {

  def srcPath = "$apiGenerateBuildDir/src/main/java"
  def targetPath = "$rootDir/src/main/java"

  // copy generated classes
  from(srcPath)
  into(targetPath)
}

tasks.register('copyOpenApiYaml', Copy) {
  // copy original YAML file so that Spring can load it
  from("$apiGenerateBuildDir/src/main/resources/openapi.yaml")
  into("$projectDir/src/main/resources/static/")
}

tasks.register('fixGeneratedControllers') {
  doLast {
    def targetDir = file("${project.getLayout().getBuildDirectory()}/apidocs/src/main/java/uk/gov/hmcts/reform/iahomeofficemockapi/generated/infrastructure/api")

    fileTree(targetDir).matching {
      include "**/*.java"
    }.forEach { file ->

      def original = file.getText("UTF-8")

      def updated = original.replaceAll(
        /return\s+new\s+ResponseEntity<[^>]*>\(HttpStatus\.NOT_IMPLEMENTED\);/,
        "return ResponseEntity.ok().build();"
      )

      updated = updated.replaceAll(
        /return\s+new\s+ResponseEntity<>\(HttpStatus\.NOT_IMPLEMENTED\);/,
        "return ResponseEntity.ok().build();"
      )

      if (original != updated) {
        file.write(updated, "UTF-8")
      }
    }
  }
}

copyApiDocs.dependsOn copyOpenApiYaml
copyApiDocs.dependsOn tasks.openApiGenerate
copyOpenApiYaml.dependsOn tasks.openApiGenerate
fixGeneratedControllers.dependsOn tasks.openApiGenerate
copyApiDocs.dependsOn fixGeneratedControllers


tasks.withType(JavaCompile).configureEach {
  options.compilerArgs += [
    '-parameters',
    '-Xlint:unchecked',
    '-Werror'
  ]
  options.encoding = 'UTF-8'
}

tasks.withType(Test).configureEach {
  useJUnitPlatform()

  testLogging {
    exceptionFormat = 'full'
  }
}

tasks.withType(Checkstyle).configureEach {
  exclude '**/generated/**', '**/openapitools/**', '**/ErrorCode.java', '**/MockApiApplication.java'
}

test {
  useJUnitPlatform()
  failFast = true

    // Always generate JUnit XML report so Jenkins can parse it
    reports {
        junitXml.required.set(true)
        html.required.set(true)
    }

    // Don’t fail the build if no tests are found
    ignoreFailures = true
}

tasks.register('functional', Test) {
  description = "Runs functional tests"
  group = "Verification"
  testClassesDirs = sourceSets.functionalTest.output.classesDirs
  classpath = sourceSets.functionalTest.runtimeClasspath
}

tasks.register('integration', Test) {
  description = "Runs integration tests"
  group = "Verification"
  testClassesDirs = sourceSets.integrationTest.output.classesDirs
  classpath = sourceSets.integrationTest.runtimeClasspath
  failFast = true
}

tasks.register('smoke', Test) {
  description = "Runs Smoke Tests"
  testClassesDirs = sourceSets.smokeTest.output.classesDirs
  classpath = sourceSets.smokeTest.runtimeClasspath
}

tasks.register('fortifyScan', JavaExec) {
  getMainClass().set("uk.gov.hmcts.fortifyclient.FortifyClientMainApp")
  classpath += sourceSets.test.runtimeClasspath
  jvmArgs = ['--add-opens=java.base/java.lang.reflect=ALL-UNNAMED']
}

processIntegrationTestResources {
  duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

processFunctionalTestResources {
  duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

configurations {
  integrationTestImplementation.extendsFrom testImplementation
  integrationTestCompile.extendsFrom testCompile
  integrationTestRuntime.extendsFrom testRuntime
  functionalTestImplementation.extendsFrom testImplementation
  functionalTestCompile.extendsFrom testCompile
  functionalTestRuntime.extendsFrom testRuntime
  smokeTestImplementation.extendsFrom testImplementation
  smokeTestCompile.extendsFrom testCompile
  smokeTestRuntime.extendsFrom testRuntime
}

checkstyle {
  maxWarnings = 100000
  toolVersion = '8.45.1'
  getConfigDirectory().set(new File(rootDir, 'config/checkstyle'))
}

pmd {
  toolVersion = '7.25.0'
  ignoreFailures = true
  sourceSets = [sourceSets.main, sourceSets.test, sourceSets.functionalTest, sourceSets.integrationTest, sourceSets.smokeTest]
  reportsDir = file("./reports/pmd")
  // https://github.com/pmd/pmd/issues/876
  ruleSets = []
  ruleSetFiles = files("config/pmd/ruleset.xml")
}

jacoco {
  toolVersion = "0.8.15"
}

jacocoTestReport {
  executionData(test, integration)
  reports {
    xml.required.set(true)
    csv.required.set(false)
    xml.outputLocation.set(layout.buildDirectory.file("reports/jacoco/test/jacocoTestReport.xml"))
  }
}

tasks.named('sonarqube') {
  dependsOn test, integration, jacocoTestReport
}

sonarqube {
  properties {
    property "sonar.projectName", "IA :: Immigration & Asylum Home Office Mock API"
    property "sonar.projectKey", "IAHOMEOFFICEMOCKAPI"
    property "sonar.coverage.jacoco.xmlReportPaths", layout.buildDirectory.file("reports/jacoco/test/jacocoTestReport.xml").get().asFile
    property "sonar.exclusions", "src/main/java/uk/gov/hmcts/reform/iahomeofficemockapi/infrastructure/config/**," +
            "src/main/java/uk/gov/hmcts/reform/iahomeofficemockapi/generated/infrastructure/api/**," +
            "src/main/java/uk/gov/hmcts/reform/iahomeofficemockapi/generated/domain/entities/**," +
            "src/main/java/org/openapitools/configuration/**," +
            "src/main/java/uk/gov/hmcts/reform/iahomeofficemockapi/**"
  }
}

// before committing a change, make sure task still works
dependencyUpdates {
  def isNonStable = { String version ->
    def stableKeyword = ['RELEASE', 'FINAL', 'GA'].any { qualifier -> version.toUpperCase().contains(qualifier) }
    def regex = /^[0-9,.v-]+$/
    return !stableKeyword && !(version ==~ regex)
  }
  rejectVersionIf { selection -> // <---- notice how the closure argument is named
    return isNonStable(selection.candidate.version) && !isNonStable(selection.currentVersion)
  }
}

// https://jeremylong.github.io/DependencyCheck/dependency-check-gradle/configuration.html
dependencyCheck {
  suppressionFile = 'config/owasp/suppressions.xml'
  configurations.collect { it.name }.findAll {
    it.startsWith('org.openapitools.configuration') ||  it.startsWith('uk.gov.hmcts.reform.iahomeofficemockapi.generated')}
  analyzers {
    // Disable scanning of .NET related binaries
    assemblyEnabled = false
  }
}

ext["tomcat.version"] = "10.1.55"

dependencyManagement {
  imports {
    mavenBom 'org.springframework.cloud:spring-cloud-dependencies:2025.1.2'
    mavenBom 'com.fasterxml.jackson:jackson-bom:2.22.0'
  }

  dependencies {
    dependencySet(group: 'org.junit.jupiter', version: '5.14.4') {
      entry 'junit-jupiter'
      entry 'junit-jupiter-api'
      entry 'junit-jupiter-engine'
      entry 'junit-jupiter-params'
    }

    dependencySet(group: 'org.junit.platform', version: '1.14.4') {
      entry 'junit-platform-commons'
      entry 'junit-platform-engine'
      entry 'junit-platform-launcher'
    }

    dependency group: 'io.rest-assured', name: 'rest-assured', version: '5.5.7'

    dependencySet(group: 'org.mockito', version: '5.23.0') {
      entry 'mockito-core'
      entry 'mockito-junit-jupiter'
    }

    dependencySet(group: 'org.apache.logging.log4j', version: '2.26.0') {
      entry 'log4j-to-slf4j'
      entry 'log4j-api'
      entry 'log4j-core'
    }

    // due to Serenity 5.3.10 forcing spring-context-support@6.2.10
    dependency group: 'org.springframework', name: 'spring-context-support', version: '6.2.19'
  }
}

repositories {
  mavenLocal()
  mavenCentral()
  maven {
    url 'https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/hmcts-lib/maven/v1'
  }
}

dependencies {
  runtimeOnly group: "jakarta.xml.bind", name: "jakarta.xml.bind-api", version: "4.0.5"

  implementation 'org.springframework.boot:spring-boot-starter-web'
  implementation 'org.springframework.boot:spring-boot-starter-actuator'
  implementation 'org.springframework.boot:spring-boot-starter-aop'
  implementation 'org.springframework.boot:spring-boot-starter-json'
  implementation 'org.springframework.boot:spring-boot-starter-validation'
  implementation 'org.springframework.cloud:spring-cloud-starter-bootstrap'

  implementation group: 'org.apache.commons', name: 'commons-lang3', version: '3.20.0'
  implementation group: 'org.springdoc', name: 'springdoc-openapi-starter-webmvc-ui', version: '2.8.17'

  implementation group: 'net.logstash.logback', name: 'logstash-logback-encoder', version: '8.1'

  implementation group: 'com.github.hmcts.java-logging', name: 'logging', version: '8.0.0'

  implementation group: 'jakarta.xml.bind', name:'jakarta.xml.bind-api', version:'4.0.5'
  implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
  implementation group: 'org.openapitools', name: 'jackson-databind-nullable', version: '0.2.10'

  // OpenAPI 3 annotations (required for generated code in 7.20.0)
  implementation group: 'io.swagger.core.v3', name: 'swagger-annotations-jakarta', version: '2.2.51'
  implementation group: 'io.swagger.core.v3', name: 'swagger-models-jakarta', version: '2.2.51'

  // Jakarta Validation API (for @Valid, @NotNull, etc.)
  implementation group: "jakarta.servlet", name: "jakarta.servlet-api", version: "6.1.0"

  testImplementation group: 'com.github.hmcts', name: 'fortify-client', version: '1.4.10'

  testImplementation 'org.springframework.boot:spring-boot-starter-test'

  testImplementation 'org.springframework.cloud:spring-cloud-contract-wiremock'

  functionalTestImplementation group: 'net.serenity-bdd', name: 'serenity-rest-assured', version: '5.3.10'
  functionalTestImplementation group: 'net.serenity-bdd', name: 'serenity-spring', version: '5.3.10'

  smokeTestImplementation 'io.rest-assured:rest-assured'

  integrationTestImplementation sourceSets.main.runtimeClasspath
  integrationTestImplementation sourceSets.test.runtimeClasspath

  functionalTestImplementation sourceSets.main.runtimeClasspath
  functionalTestImplementation sourceSets.test.runtimeClasspath

  smokeTestImplementation sourceSets.main.runtimeClasspath
  smokeTestImplementation sourceSets.test.runtimeClasspath
}

mainClassName = 'uk.gov.hmcts.reform.iahomeofficemockapi.MockApiApplication'
def jarName = 'ia-home-office-mock-api.jar'

bootJar {
  getArchiveFileName().set(provider {
    'ia-home-office-mock-api.jar'
  })

  manifest {
    attributes('Implementation-Version': project.version.toString())
  }
}

wrapper {
    distributionType = Wrapper.DistributionType.ALL
}

bootRun {
    mainClass.set("uk.gov.hmcts.reform.iahomeofficemockapi.MockApiApplication")
}
