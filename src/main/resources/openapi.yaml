    SearchResponse_applicationStatus_claimReasonType:
      description: Type of reason for claim on application. **Note:** may not be available
        for any cases
      example:
        code: HUMANRIGHTS
        description: Human Rights
      properties:
        code:
          description: Code for the claim reason type
          example: HUMANRIGHTS
          type: string
        description:
          description: Description of the claim reason type
          example: Human Rights
          type: string
      type: object
    SearchResponse_applicationStatus_decisionType:
      description: Type of decision made on the application
      example:
        code: REJECTION
        description: Rejected
      properties:
        code:
          description: Code for the decision type
          example: REJECTION
          type: string
        description:
          description: Description of the decision type
          example: Rejected
          type: string
      type: object
    SearchResponse_applicationStatus_decisionCommunication:
      description: Communication of the decision
      example:
        sentDate: 2017-07-21T17:32:28Z
        dispatchDate: 2017-07-21T17:32:28Z
        description: E-mail
        type: EMAIL
      properties:
        type:
          description: Type of communication
          enum:
          - EMAIL
          - POST
          example: EMAIL
          type: string
        description:
          description: Description of the communication type
          example: E-mail
          type: string
        sentDate:
          description: "Date (and time, if available) the communication was requested\
            \ to be sent. This is effectively the decision date. See description of\
            \ decisionDate for details of how it will be displayed. This is assumed\
            \ to be in UTC"
          example: 2017-07-21T17:32:28Z
          format: date-time
          type: string
        dispatchDate:
          description: "Date (and time, if available) the communication was actually\
            \ dispatched. See description of decisionDate for details of how it will\
            \ be displayed. This is assumed to be in UTC"
          example: 2017-07-21T17:32:28Z
          format: date-time
          type: string
      type: object
    SearchResponse_applicationStatus_rejectionReasons:
      example:
        reason: Application not completed properly
      properties:
        reason:
          description: Reason for application rejection
          example: Application not completed properly
          type: string
      type: object
    SearchResponse_applicationStatus_metadata:
      description: "Metadata item, comprising an item code and one (usually) or more\
        \ data values that are typed"
      example:
        valueBoolean: true
        code: APPEALABLE or DISPATCH_DATE
        valueString: Some extra decision data
        valueDateTime: 2017-07-21T17:32:28Z
      properties:
        code:
          description: Metadata item code
          example: APPEALABLE or DISPATCH_DATE
          type: string
        valueBoolean:
          description: Boolean metadata value
          example: true
